<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Biblioteca Mea</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; color: #333; }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px; text-align: center; color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* CĂUTARE */
        .search-box {
            background: rgba(255,255,255,0.25); padding: 10px; border-radius: 50px;
            display: inline-flex; gap: 10px; backdrop-filter: blur(5px); margin-bottom: 20px;
        }
        input, select { padding: 10px 15px; border-radius: 20px; border: none; font-size: 15px; outline:none; }
        button { padding: 10px 25px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }

        .btn-search { background: #ff6b6b; color: white; }
        .btn-search:hover { transform: scale(1.05); background: #ee5253; }

        /* GENERATOR PE GENURI */
        .generator-panel {
            background: rgba(0,0,0,0.2); padding: 15px 25px; border-radius: 20px;
            display: inline-block; margin-top: 10px; border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-magic { background: #00b894; color: white; margin-left: 5px; }
        .btn-magic:hover { background: #00cec9; transform: scale(1.05); }

        /* LINK SPRE PAGINA FAVORITE - ESTE UN LINK, NU UN BUTON JS */
        .btn-link-top {
            display: inline-block; margin-left: 15px; background: #fdcb6e; color: #d35400;
            padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold;
        }
        .btn-link-top:hover { background: #ffeaa7; }

        /* GRID */
        .container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px;
            max-width: 1400px; margin: 40px auto; padding: 0 20px;
        }
        .card {
            background: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: transform 0.3s;
            display: flex; flex-direction: column; text-decoration: none; color: inherit;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card-img { height: 320px; object-fit: cover; width: 100%; }
        .card-body { padding: 15px; }
        .badge { background: #e0f7fa; color: #006064; padding: 3px 10px; border-radius: 10px; font-size: 0.75em; font-weight: bold; }
        .card-desc { font-size: 0.85em; color: #636e72; margin-top: 8px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        .loader {
            border: 3px solid #f3f3f3; border-top: 3px solid #fff; border-radius: 50%;
            width: 15px; height: 15px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header">
    <h1>📚 Biblioteca Mea</h1>

    <form action="/carti" method="get" class="search-box">
        <input type="text" name="q" placeholder="Caută titlu..." th:value="${cautare}">
        <select name="gen">
            <option value="">Toate genurile</option>
            <option th:each="g : ${genuri}" th:value="${g}" th:text="${g}" th:selected="${g == selectatGen}"></option>
        </select>
        <button type="submit" class="btn-search">🔍 Filtrează</button>
        <a href="/" style="color:white; align-self:center; margin-left:10px; text-decoration:none;">Reset</a>
    </form>

    <br>

    <div class="generator-panel">
        <span style="font-weight:bold; margin-right:10px;">🤖 Generează Cărți Noi:</span>
        <select id="gen-agent">
            <option value="Science Fiction">Science Fiction</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Horror">Horror</option>
            <option value="Mystery">Mister & Thriller</option>
            <option value="Romance">Romantic</option>
            <option value="History">Istorie</option>
            <option value="Philosophy">Filozofie</option>
            <option value="Psychology">Psihologie</option>
            <option value="Biography">Biografii</option>
        </select>

        <button id="btn-gen" class="btn-magic" onclick="pornesteAgentul()">
            ➕ Adaugă 5
        </button>

        <a href="/populare" class="btn-link-top">
            🔥 Mergi la Favorite & Topuri
        </a>
        <a href="/invata" class="btn-link-top" style="background: #6c5ce7; color: white;">
            🎓 Vreau să învăț ceva nou
        </a>

        <div id="status-msg" style="margin-top:10px; font-size:0.9em; min-height:20px;"></div>
    </div>
</div>

<div class="container">
    <div th:if="${#lists.isEmpty(carti)}" style="text-align:center; grid-column:1/-1; color:#888; margin-top:50px;">
        Biblioteca este goală. Folosește generatorul de sus pentru a începe!
    </div>

    <a th:each="carte : ${carti}" th:href="@{/detalii(titlu=${carte.titlu})}" class="card">
        <img th:src="${carte.imagine}" class="card-img" alt="Coperta">
        <div class="card-body">
            <span class="badge" th:text="${carte.categorie}">Gen</span>
            <h3 style="margin:5px 0; font-size:1.1em;" th:text="${carte.titlu}">Titlu</h3>
            <div style="color:#7f8c8d; font-size:0.9em;" th:text="${carte.autor}">Autor</div>
            <p class="card-desc" th:text="${carte.descriere}">...</p>
        </div>
    </a>
</div>

<script>
    function pornesteAgentul() {
        const gen = document.getElementById('gen-agent').value;
        const btn = document.getElementById('btn-gen');
        const status = document.getElementById('status-msg');

        btn.disabled = true;
        btn.innerHTML = '<div class="loader"></div>';
        status.innerText = "🔍 Caut cele mai bune cărți de " + gen + "... (Atenție: Eroarea 429 înseamnă COTA epuizată!)";
        status.style.color = "#ffeaa7";

        fetch('/api/agent/auto-populeaza', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({gen: gen})
        })
            .then(response => response.text())
            .then(text => {
                if(text.includes("Eroare") || text.includes("429")) {
                    status.innerText = "❌ EROARE: " + text;
                    status.style.color = "#ff7675";
                    alert("Eroare:\n" + text);
                } else {
                    status.innerText = "✅ Gata!";
                    status.style.color = "#55efc4";

                    alert(text);

                    location.reload();
                }
                btn.disabled = false;
                btn.innerHTML = "➕ Adaugă 5";
            })
            .catch(err => {
                status.innerText = "❌ Eroare rețea: " + err;
                btn.disabled = false;
                btn.innerHTML = "➕ Adaugă 5";
            });
    }
</script>

</body>
</html>
