<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Scanner Bibliotecă</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f8f9fa; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }

        /* Zona de Camera: Acum ocupă spațiul corect și nu mai are overlay mic */
        .camera-container {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            /* Ajustăm înălțimea să fie proporțională */
            aspect-ratio: 3 / 4;
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Umple tot containerul fără margini negre */
        }

        #photo-preview {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; display: none; z-index: 5;
        }

        .btn { border: none; padding: 15px; border-radius: 12px; font-weight: 600; cursor: pointer; width: 100%; font-size: 16px; margin-top: 15px; transition: 0.3s; }
        .btn-scan { background: #6c5ce7; color: white; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3); }
        .btn-scan:active { transform: scale(0.98); }
        .btn-scan:disabled { background: #b2bec3; }

        /* Listă Scanări */
        .scan-item { display: flex; align-items: center; background: white; padding: 12px; border-radius: 15px; margin-top: 12px; gap: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .scan-item img { width: 45px; height: 65px; border-radius: 8px; object-fit: cover; }
        .info { flex-grow: 1; }
        .info h4 { margin: 0; font-size: 14px; }
        .btn-del { background: #ff7675; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; }

        #status { text-align: center; margin: 15px; font-weight: 600; color: #6c5ce7; min-height: 24px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">📸 Adaugă prin Poză</h2>

    <div class="camera-container">
        <video id="video" autoplay playsinline></video>
        <img id="photo-preview" src="" alt="Preview">
    </div>

    <button class="btn btn-scan" id="snap">FĂ POZĂ COPERTEI</button>
    <div id="status"></div>

    <h3 style="margin-top: 30px;">Scanări recente:</h3>
    <div th:each="c : ${cartiScanate}" class="scan-item">
        <img th:src="${c.imagine}">
        <div class="info">
            <h4 th:text="${c.titlu}">Titlu</h4>
            <p style="margin:0; font-size:12px;" th:text="${c.autor}">Autor</p>
        </div>
        <button class="btn-del" th:data-titlu="${c.titlu}" onclick="deleteBook(this.getAttribute('data-titlu'))">Șterge</button>
    </div>

    <p style="text-align: center; margin-top: 25px;"><a href="/" style="color: #636e72; text-decoration:none;">⬅ Înapoi la colecție</a></p>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const snap = document.getElementById('snap');
    const status = document.getElementById('status');
    const preview = document.getElementById('photo-preview');
    const canvas = document.getElementById('canvas');

    // Pornire cameră cu rezoluție optimă pentru mobil
    navigator.mediaDevices.getUserMedia({
        video: {
            facingMode: "environment",
            width: { ideal: 1280 },
            height: { ideal: 720 }
        }
    })
        .then(stream => { video.srcObject = stream; });

    snap.addEventListener('click', () => {
        // 1. Setăm dimensiunea canvas-ului EXACT la dimensiunea fluxului video real
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        const context = canvas.getContext('2d');
        // 2. Desenăm tot ce vede camera pe tot canvas-ul
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        const dataURL = canvas.toDataURL('image/jpeg', 0.9);

        // 3. Afișăm preview-ul peste video ca să știi că s-a făcut poza
        preview.src = dataURL;
        preview.style.display = "block";
        video.style.opacity = "0.3";

        status.innerText = "⏳ AI-ul analizează poza...";
        snap.disabled = true;

        fetch('/api/agent/scaneaza', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ imagine: dataURL })
        })
            .then(r => r.text())
            .then(msg => {
                alert(msg);
                location.reload();
            })
            .catch(err => {
                status.innerText = "❌ Eroare server.";
                snap.disabled = false;
                preview.style.display = "none";
                video.style.opacity = "1";
            });
    });

    function deleteBook(titlu) {
        if(confirm("Ștergem '" + titlu + "'?")) {
            fetch('/api/delete-book', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ titlu: titlu })
            }).then(() => location.reload());
        }
    }
</script>

</body>
</html>
