<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Înregistrare | Biblioteca Mea</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        h1 { margin-bottom: 10px; font-size: 2em; }
        input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #009485; }
        button { background: #111; color: white; padding: 14px; width: 100%; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #333; }
        .link { display: block; margin-top: 20px; color: #009485; text-decoration: none; font-size: 0.9em; font-weight: 600; }

        /* NOU: CSS pentru Parolă cu Ochișor */
        .password-container { position: relative; width: 100%; margin-bottom: 15px; }
        .password-container input { margin-bottom: 0; padding-right: 40px; }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 18px; user-select: none; opacity: 0.7; transition: 0.2s; }
        .toggle-password:hover { opacity: 1; }
    </style>
</head>
<body>

<div class="card">
    <h1>Creare Cont ✨</h1>
    <p style="color: #64748b; margin-bottom: 30px;">Alătură-te bibliotecii noastre!</p>

    <input type="text" id="nume" placeholder="Numele tău">
    <input type="email" id="email" placeholder="Adresa de Email">

    <div class="password-container">
        <input type="password" id="parola" placeholder="Parola">
        <span class="toggle-password" onclick="togglePassword('parola', this)">👁️</span>
    </div>

    <button onclick="creareCont()" id="btnReg">Creează Contul</button>

    <a href="/login" class="link">Ai deja cont? Loghează-te aici</a>
</div>

<script>
    // NOU: Funcția care arată/ascunde parola
    function togglePassword(inputId, iconElement) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
            input.type = "text";
            iconElement.innerText = "🙈";
        } else {
            input.type = "password";
            iconElement.innerText = "👁️";
        }
    }

    function creareCont() {
        const nume = document.getElementById('nume').value.trim();
        const email = document.getElementById('email').value.trim();
        const parola = document.getElementById('parola').value.trim();

        if(!nume || !email || !parola) { alert("Completează toate câmpurile!"); return; }

        const btn = document.getElementById('btnReg');
        btn.innerText = "Se creează..."; btn.disabled = true;

        fetch('/api/utilizator/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({nume: nume, email: email, parola: parola})
        })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'succes') {
                    sessionStorage.setItem('currentUser', data.nume);
                    window.location.href = '/profil';
                } else {
                    alert(data.mesaj);
                    btn.innerText = "Creează Contul"; btn.disabled = false;
                }
            });
    }
</script>
</body>
</html>
