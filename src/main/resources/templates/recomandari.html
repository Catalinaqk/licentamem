<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recomandari</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        .header {
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            padding: 60px 20px; text-align: center; color: white;
        }
        .search-container {
            background: rgba(255,255,255,0.2);
            padding: 25px;
            border-radius: 50px;
            display: inline-flex;
            gap: 15px;
            backdrop-filter: blur(10px);
            margin-top: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        input {
            padding: 15px 25px;
            border-radius: 30px;
            border: none;
            font-size: 16px;
            outline: none;
            width: 350px;
        }
        button {
            padding: 15px 35px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            background: #fdcb6e;
            color: #d35400;
            transition: 0.3s;
            font-size: 16px;
        }
        button:hover { transform: scale(1.05); background: #ffeaa7; }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }
        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            text-decoration: none;
            color: inherit;
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-10px); }
        .card-img { width: 100%; height: 350px; object-fit: cover; }
        .card-body { padding: 20px; }
        .empty-msg { text-align: center; grid-column: 1/-1; color: #636e72; font-size: 1.2em; margin-top: 40px; }
    </style>
</head>
<body>

<div class="header">
    <h1>🎓 Ce vrei să înveți nou astăzi?</h1>
    <p>Introdu un subiect (ex: biologie, istorie, alergii) și lasă Memgraph să găsească legăturile.</p>

    <form action="/recomandari" method="get" class="search-container">
        <input type="text" name="tag" placeholder="ex: alergii, spatiu, dragoste..." th:value="${cuvantCautat}" required>
        <button type="submit">Caută în Graf</button>
    </form>

    <br><br>
    <a href="/" style="color: white; text-decoration: none; font-weight: 600; opacity: 0.8;">⬅ Înapoi la Colecție</a>
</div>

<div class="container">
    <div th:if="${#lists.isEmpty(carti)}" class="empty-msg">
        <p th:if="${cuvantCautat == null}">Începe prin a căuta un subiect mai sus.</p>
        <p th:if="${cuvantCautat != null}">Nu am găsit nicio conexiune în graf pentru "<span th:text="${cuvantCautat}"></span>".</p>
    </div>

    <a th:each="carte : ${carti}" th:href="@{/detalii(titlu=${carte.titlu})}" class="card">
        <img th:src="${carte.imagine}" class="card-img" alt="Coperta">
        <div class="card-body">
            <h3 style="margin:0 0 10px 0; font-size:1.1em;" th:text="${carte.titlu}">Titlu</h3>
            <div style="color:#7f8c8d; font-size:0.9em;" th:text="${carte.autor}">Autor</div>
        </div>
    </a>
</div>

</body>
</html>
